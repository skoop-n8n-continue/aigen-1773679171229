<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Live Sports Scoreboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=sb2026b">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#00b7af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M8 12a4 4 0 0 1 8 0"></path>
                    <path d="M12 8v8"></path>
                </svg>
                <span>SPORTS<span class="highlight">CORE</span></span>
            </div>
            <div class="header-center">
                <h1 id="page-title">LIVE & RECENT GAMES</h1>
            </div>
            <div class="live-indicator">
                <span class="pulse"></span>
                <span>LIVE UPDATES</span>
            </div>
        </header>

        <!-- Main Scoreboard Area -->
        <main class="scoreboard">
            <div id="games-grid" class="games-grid">
                <!-- Game cards will be injected here via JavaScript -->
            </div>
        </main>

        <!-- Ticker Footer -->
        <footer class="app-footer">
            <div class="ticker-label">LATEST</div>
            <div class="ticker-wrap">
                <div class="ticker-move" id="ticker-content">
                    <!-- Ticker items injected here -->
                </div>
            </div>
        </footer>
    </div>
    <script src="script.js?v=sb2026b"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
